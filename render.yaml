services:
  - type: web
    name: whatsapp-kimi-bridge
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GREEN_API_URL
        sync: false
      - key: GREEN_API_INSTANCE_ID
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
      - key: KIMI_API_KEY
        sync: false
      - key: KIMI_DEFAULT_MODEL
        value: kimi-k2.5
      - key: KIMI_API_URL
        value: https://api.moonshot.ai/v1
      - key: KIMI_MAX_HISTORY
        value: "50"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_API_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.2-90b-vision-instruct
      - key: OPENROUTER_MAX_HISTORY
        value: "50"
      - key: GIRLFRIEND_PHONES
        sync: false
      - key: THINKING_ENABLED_DEFAULT
        value: "false"
      - key: ALLOWED_PHONES
        sync: false
